version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version

      # 🔥 Set variables
      - REPOSITORY_URI=212045812865.dkr.ecr.us-east-1.amazonaws.com/project/insure-me
      - IMAGE_TAG=latest

      # 🔐 Login to ECR
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 212045812865.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Build started on `date`

      # 🚀 Build Docker image (directly with ECR tag)
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .

  post_build:
    commands:
      - echo Pushing Docker image to ECR...

      # 📦 Push image
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      # 📄 Create imagedefinitions.json (for ECS deployment)
      - echo Creating imagedefinitions.json...
      - printf '[{"name":"sample-app","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
