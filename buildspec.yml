version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to ECR...
      - REPOSITORY_URI=212045812865.dkr.ecr.us-east-1.amazonaws.com/dev/sample-app
      - IMAGE_TAG=latest
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 212045812865.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Build started
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .

  post_build:
    commands:
      - echo Pushing image...
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - printf '[{"name":"sample-app","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json