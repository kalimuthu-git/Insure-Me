version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version

      # 🔥 Set variables
      - REPOSITORY_URI=212045812865.dkr.ecr.ap-south-1.amazonaws.com/project/insure-me:latest
      - IMAGE_TAG=latest

      # 🔐 Login to ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 212045812865.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Build started on `date`

      # 🧪 Debug (optional but useful)
      - echo "Files in directory:"
      - ls -la

      # 🚀 Build Docker image
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .

  post_build:
    commands:
      - echo Pushing Docker image to ECR...

      # 📦 Push image
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      # 📄 Create imagedefinitions.json for ECS
      - echo Creating imagedefinitions.json...
      - printf '[{"name":"insure-me-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
