<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INSURE-ME</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
    }

    nav a {
      margin: 0 15px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 50px;
    }

    .hero-text {
      max-width: 500px;
    }

    .hero-text h1 {
      font-size: 40px;
    }

    .hero-text p {
      line-height: 1.6;
    }

    .btn {
      background: #00c853;
      padding: 12px 25px;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      font-size: 16px;
    }

    .hero-img img {
      width: 400px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
    }
  </style>
</head>
<body>

<header>
  <h2>INSURE-ME</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>PROTECT YOUR FAMILY AND YOUR FUTURE</h1>
    <p>
      Life insurance is the perfect safety net, helping you to protect your family if something unfortunate happens.
    </p>
    <button class="btn">Contact Us</button>
  </div>

  <div class="hero-img">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="insurance">
  </div>
</section>

<footer>
  <p>© 2026 INSURE-ME | DevOps Project</p>
</footer>

  
<!-- Contact Form -->
<section style="padding:40px; background:#1c2b36;">
  <h2>Contact Us</h2>
  <form action="/contact" method="POST">
    <input type="text" name="name" placeholder="Your Name" required><br><br>
    <input type="email" name="email" placeholder="Your Email" required><br><br>
    <textarea name="message" placeholder="Your Message" required></textarea><br><br>
    <button class="btn" type="submit">Send</button>
  </form>
</section>

</body>
</html>
